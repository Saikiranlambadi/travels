 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Details</title>

  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Georgia, serif;
    }

    body{
      background:#f3f3f3;
      color:#111;
    }

    .container{
      max-width:950px;
      margin:auto;
      padding:20px;
    }

   

    .top-bar{
      display:flex;
      align-items:flex-start;
      gap:15px;
      margin-bottom:20px;
    }

    .back-btn{
      font-size:28px;
      margin-top:5px;
      cursor:pointer;
      color:#333;
    }

    .page-title h1{
      font-size:42px;
      font-weight:700;
      color:#0d1b4c;
    }

    .page-title p{
      color:#666;
      font-size:20px;
      margin-top:5px;
    }

  

    .gallery{
      background:#fff;
      border-radius:25px;
      overflow:hidden;
      padding-bottom:20px;
      margin-bottom:25px;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    .main-image img{
      width:100%;
      height:500px;
      object-fit:cover;
      display:block;
    }

    .thumbnail-row{
      display:flex;
      gap:12px;
      padding:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .thumb{
      width:100px;
      height:75px;
      border-radius:15px;
      overflow:hidden;
      border:3px solid transparent;
      cursor:pointer;
      transition:0.3s;
    }

    .thumb:hover{
      transform:scale(1.05);
    }

    .thumb.active{
      border-color:#f5a623;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    

    .details-card{
      background:#fff;
      border-radius:25px;
      padding:35px;
      margin-bottom:30px;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    .details-card h2{
      font-size:52px;
      margin-bottom:25px;
      font-weight:700;
      color:#0d1b4c;
    }

    .badge-row{
      display:flex;
      gap:15px;
      margin-bottom:35px;
      flex-wrap:wrap;
    }

    .badge{
      background:#f4f4f4;
      padding:14px 22px;
      border-radius:14px;
      font-size:22px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .badge i{
      color:#000;
    }

    .divider{
      border-top:1px solid #ddd;
      margin-bottom:25px;
    }

  

    .owner-box{
      display:flex;
      align-items:center;
      gap:18px;
    }

    .owner-icon{
      width:70px;
      height:70px;
      border-radius:50%;
      background:#f7de69;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:28px;
    }

    .owner-info small{
      color:#777;
      font-size:16px;
    }

    .owner-info h3{
      font-size:34px;
      font-weight:700;
    }

   

    .whatsapp-btn{
      width:100%;
      background:#25D366;
      color:#fff;
      border:none;
      padding:22px;
      border-radius:20px;
      font-size:28px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      text-decoration:none;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .whatsapp-btn:hover{
      background:#1fb557;
    }

    .whatsapp-btn i{
      margin-right:12px;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .page-title h1{
        font-size:32px;
      }

      .page-title p{
        font-size:16px;
      }

      .main-image img{
        height:280px;
      }

      .details-card h2{
        font-size:36px;
      }

      .badge{
        font-size:18px;
      }

      .owner-info h3{
        font-size:24px;
      }

      .whatsapp-btn{
        font-size:22px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    

    <div class="top-bar">

      <div class="back-btn" onclick="history.back()" title="Go back">
        <i class="fa-solid fa-arrow-left"></i>
      </div>

      <div class="page-title">
        <h1>Car Details</h1>
      </div>

      

    </div>

    

    <div class="gallery">

      

      <div class="main-image">
        <img id="mainCarImage"
          src="sultan4.jpeg"
          alt="Swift Dzire">
      </div>

      

      <div class="thumbnail-row">

      

        <div class="thumb active"
          onclick="changeImage(this,'sultan4.jpeg')">

          <img src="sultan4.jpeg" alt="Front View">
        </div>

        

        <div class="thumb"
          onclick="changeImage(this,'sultan 3.webp')">

          <img src="sultan 3.webp" alt="Interior View">
        </div>


        <div class="thumb"
          onclick="changeImage(this,'sultan6.png')">

          <img src="sultan6.png" alt="Side View">
        </div>

      </div>

    </div>

   

    <div class="details-card">

      <h2>Swift Dzire</h2>

      <div class="badge-row">

        <div class="badge">
          <i class="fa-solid fa-users"></i>
          4+1 Seats
        </div>

        <div class="badge">
          <i class="fa-solid fa-circle"></i>
          Available
        </div>

      </div>

      <div class="divider"></div>

   

      <div class="owner-box">

        <div class="owner-icon">
          <i class="fa-regular fa-user"></i>
        </div>

        <div class="owner-info">
          <small>Car Owner</small>
          <h3>syed gouse</h3>
        </div>

      </div>

    </div>

    <

    <a href="https://wa.me/919100676559"
       target="_blank"
       rel="noopener noreferrer"
       class="whatsapp-btn">

      <i class="fa-brands fa-whatsapp"></i>
      Book Now via WhatsApp

    </a>

  </div>

  <script>

    function changeImage(element, imageSrc){

      
      document.getElementById("mainCarImage").src = imageSrc;

      
      document.querySelectorAll(".thumb").forEach(thumb=>{
        thumb.classList.remove("active");
      });

      // Add Active Class
      element.classList.add("active");
    }

  </script>

</body>


  

  <script>

    function changeImage(element, imageSrc){

      // Change Main Image
      document.getElementById("mainCarImage").src = imageSrc;

      // Remove Active Class
      document.querySelectorAll(".thumb").forEach(thumb=>{
        thumb.classList.remove("active");
      });

      // Add Active Class
      element.classList.add("active");
    }

  </script>

</body>

</html>
