<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SULTAN TRAVELS</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#000;
    }

    /* Main Container */
    .hero{
      width:100%;
      height:100vh;
      background:url('sultan.png');
      background-size:cover;
      background-position:center;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    /* Dark Overlay */
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.55);
    }

    /* Content */
    .content{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:160px;
      z-index:2;
      text-align:center;
      padding:20px;
      width:100%;
      max-width:600px;
    }

    .car-gallery{
      background:#111;
      padding:40px 20px 80px;
    }

    .gallery-wrapper{
      max-width:1080px;
      margin:0 auto;
      background:#fff;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,0.18);
    }

    .gallery-main img{
      width:100%;
      display:block;
      height:auto;
      object-fit:cover;
    }

    .gallery-thumbs{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      padding:18px;
      flex-wrap:wrap;
      background:#fafafa;
    }

    .gallery-thumbs .thumb{
      width:96px;
      height:72px;
      object-fit:cover;
      border-radius:14px;
      border:3px solid transparent;
      cursor:pointer;
      transition:transform 0.25s ease, border-color 0.25s ease;
    }

    .gallery-thumbs .thumb:hover{
      transform:scale(1.05);
    }

    .gallery-thumbs .thumb.active{
      border-color:#f5a300;
    }

    .title{
      color:#f5a300;
      font-size:60px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .subtitle{
      color:white;
      font-size:22px;
      line-height:1.5;
      margin-bottom:20px;
    }

    .hero-links{
      display:flex;
      justify-content:center;
      gap:16px;
      margin-bottom:40px;
      flex-wrap:wrap;
    }

    .hero-links a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(245,166,0,0.95);
      color:#111;
      padding:14px 28px;
      border-radius:18px;
      font-weight:700;
      text-decoration:none;
      transition:transform 0.25s ease, background 0.25s ease;
    }

    .hero-links a:hover{
      transform:translateY(-2px);
      background:#ffb400;
    }

    /* Button */
    .explore-btn{
      background:#f5a300;
      color:white;
      border:none;
      padding:18px 40px;
      font-size:22px;
      font-weight:bold;
      border-radius:18px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:12px;
      transition:0.3s;
      box-shadow:0 5px 20px rgba(0,0,0,0.4);
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:30px;
      z-index:999;
      max-width:520px;
      width:auto;
    }

    .explore-btn:hover{
      transform:scale(1.05);
      background:#ffb400;
    }

    /* Car Icon */
    .icon{
      font-size:24px;
    }

    /* Mobile Responsive */
    @media(max-width:600px){

      .title{
        font-size:42px;
      }

      .subtitle{
        font-size:18px;
      }

      .explore-btn{
        width:calc(100% - 40px);
        left:50%;
        transform:translateX(-50%);
        bottom:20px;
        justify-content:center;
        font-size:20px;
        padding:16px;
      }

      .content{
        bottom:120px;
        padding:12px;
      }

      .title{
        font-size:36px;
      }

    }

  </style>
</head>

<body>

  <section class="hero">

    <div class="content">

      <h1 class="title">SULTAN TRAVELS</h1>
      <p class="subtitle">
        Find and book the perfect car for your journey
      </p>

      <div class="hero-links">
        <a href="sultan.html">View Car Page</a>
        <a href="booking.html">Go to Booking</a>
      </div>

    </div>

    <a href="sultan.html" class="explore-btn">
      <span class="icon">🚘</span>
      Explore Cars
    </a>

  </section>
  
  <section class="car-gallery">
    <div class="gallery-wrapper">
      <div class="gallery-main">
        <img id="mainImage" src="sultan4.jpeg" alt="Swift Dzire front view" />
      </div>
      <div class="gallery-thumbs">
        <img class="thumb active" src="sultan4.jpeg" data-large="sultan4.jpeg" alt="Front view" />
        <img class="thumb" src="sultan1.jpeg" data-large="sultan1.jpeg" alt="Car side view" />
        <img class="thumb" src="sultan2.jpeg" data-large="sultan2.jpeg" alt="Car interior" />
        <img class="thumb" src="sultan 3.webp" data-large="sultan 3.webp" alt="Car rear view" />
        <img class="thumb" src="sultan6.png" data-large="sultan6.png" alt="Car angle view" />
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function(){
      const thumbs = document.querySelectorAll('.thumb');
      const main = document.getElementById('mainImage');
      thumbs.forEach(thumb => {
        thumb.addEventListener('click', function(){
          thumbs.forEach(el => el.classList.remove('active'));
          this.classList.add('active');
          const large = this.dataset.large;
          if(large) main.src = large;
        });
      });
    });
  </script>

</body>
</html>
